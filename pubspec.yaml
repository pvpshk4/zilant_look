name: zilant_look
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  equatable: ^2.0.7
  floor: ^1.5.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_hooks: ^0.21.2
  get_it: ^8.0.3
  go_router: ^14.8.1
  http: ^1.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  retrofit: ^4.4.2

dev_dependencies:
  build_runner: ^2.4.15
  floor_generator: ^1.5.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  retrofit_generator: ^9.1.9

flutter:
  uses-material-design: true

  fonts:
    - family: SFPro-Light
      fonts:
        - asset: assets/fonts/SFProText-Light.ttf
    - family: SFPro-Medium
      fonts:
        - asset: assets/fonts/SFProText-Medium.ttf
    - family: SFPro-Semibold
      fonts:
        - asset: assets/fonts/SFProText-Semibold.ttf
